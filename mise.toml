[settings]
npm.package_manager  = "pnpm"
trusted_config_paths = ["/workspace"]

[tools]
node   = "24.15.0"
pnpm   = "10.33.0"
python = "3.14.5"

"aqua:anthropics/claude-code" = "2.1.138"
ffmpeg                        = "8.1.1"

# checker
"aqua:astral-sh/ruff"                            = "0.15.13"
"aqua:biomejs/biome"                             = "2.4.15"
"aqua:editorconfig-checker/editorconfig-checker" = "3.6.1"
"aqua:gitleaks/gitleaks"                         = "8.30.1"
pre-commit                                       = { version = "4.6.0", postinstall = "mise generate git-pre-commit -w --task=pre-commit" }
taplo                                            = "0.10.0"

[env]
LD_LIBRARY_PATH = "{{ get_env(name='HOME', default='') }}/.local/share/mise/installs/ffmpeg/8.1.1/lib:{{ get_env(name='LD_LIBRARY_PATH', default='') }}"

[tasks.pre-commit]
run = """
pre-commit run
"""
