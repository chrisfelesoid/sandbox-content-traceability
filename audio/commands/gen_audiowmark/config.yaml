source_path: &source_path ../../datasets/source
watermarked_path: &watermarked_path ../../datasets/watermarked/audiowmark
benchmark_path: &benchmark_path ../../benchmark/audiowmark
body: &body "04d7a16944914b4e8f58842a9ee5d557"
body_type: &body_type hex
encode:
  input: *source_path
  output: *watermarked_path
  body: *body
  body_type: *body_type
  key: ./key/test.key
  strength: null
  parity_bits: 2
decode:
  input: *watermarked_path
  key: ./key/test.key
  detect_speed: false
  detect_speed_patient: false
  parity_bits: 2
  threshold: 1.0
benchmark:
  source_dir: *source_path
  watermarked_dir: *watermarked_path
  benchmark_dir: *benchmark_path
  scenarios:
    - name: mp3_loop
      bitrates: [128, 96, 64, 48, 32]
    - name: pitch_stretch
      pitch_shift:
        semitones: [-4, -2, -1, 1, 2, 4]
      time_stretch:
        speed_ratios: [0.75, 0.9, 0.95, 1.05, 1.1, 1.25]
    - name: single_pass
      mp3:
        bitrates_kbps: [32, 64, 96, 128, 192, 320]
      resample:
        sample_rates: [8000, 16000, 22050, 44100]
      noise:
        snr_db: [10, 20, 30, 40]
